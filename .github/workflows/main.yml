name: Run Minecraft Bot
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *' # Restarts every 4 hours to avoid timing out

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node index.js
